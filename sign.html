<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSD — Sign</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --text: #e8e8e8; --text-muted: #666;
      --border: #2a2a2a; --primary: #c8a96e; --primary-hover: #b8935a;
      --success: #4caf77; --warning: #e8a020; --danger: #e05050;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      --radius: 6px;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; padding: 28px 20px; }
    h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
    .banner { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 16px; }
    .platform { color: var(--warning); font-size: 13px; min-height: 18px; }
    .preview { font-family: var(--mono); font-size: 12px; background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: var(--radius); white-space: pre-wrap; word-break: break-word; max-height: 46vh; overflow-y: auto; margin-bottom: 16px; line-height: 1.65; }
    .status { min-height: 20px; margin-bottom: 14px; font-size: 13px; }
    .actions { display: flex; align-items: center; gap: 20px; }
    button { background: var(--primary); color: #0a0a0a; border: none; padding: 14px 36px; border-radius: var(--radius); cursor: pointer; font-size: 15px; font-weight: 600; transition: background 0.15s; }
    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    a { color: var(--text-muted); font-size: 12px; text-decoration: none; }
    a:hover { color: var(--text); }
    .ok   { color: var(--success); }
    .fail { color: var(--danger); font-weight: 600; }
  </style>
</head>
<body>
  <div class="banner">
    <h2>This is exactly what you are signing.</h2>
    <p class="platform" id="platform"></p>
  </div>
  <pre id="preview" class="preview"></pre>
  <div id="status" class="status"></div>
  <!-- PIN form — shown only when pin_fallback_enabled is active -->
  <div id="pin-form" style="display:none;margin-bottom:14px">
    <label style="display:block;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Signing PIN</label>
    <input type="password" id="pin-input" placeholder="0000" maxlength="4" inputmode="numeric" pattern="\d{4}" autocomplete="current-password"
           style="width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-size:14px;font-family:inherit">
  </div>
  <div class="actions">
    <button id="sign-btn">Sign</button>
    <a href="#" id="cancel-link">Cancel</a>
  </div>

  <!-- globals must be defined before the shared modules load -->
  <script>
    const MOCK_MODE = false;
    const MOCK_DB   = null;
    const log = (...a) => console.log('[SSD sign]', ...a);
  </script>
  <script src="db.js"></script>
  <script src="cryptoOps.js"></script>
  <script src="passkey.js"></script>
  <script src="keyring.js"></script>
  <script>
    'use strict';

    const _sp = new URLSearchParams(location.search);

    // Detect entry shape:
    //   - extension pre-built: has signed_payload
    //   - bookmarklet: action=sign&text=...
    //   - share target: text=... (no action, no signed_payload)
    const _action = _sp.get('action') || '';
    const _isRawText = _sp.has('text') && !_sp.has('signed_payload');
    const _isShare = _isRawText && !_action;

    const ctx = {
      requestId:     _sp.get('request_id')     || '',
      extId:         _sp.get('ext_id')         || '',
      fingerprint:   _sp.get('fingerprint')    || '',
      signedPayload: _sp.get('signed_payload') || '',
      platform:      _sp.get('platform')       || '',
      rawText:       _sp.get('text')           || '',
      context:       _sp.get('context')        || '',
    };

    const platEl     = document.getElementById('platform');
    const previewEl  = document.getElementById('preview');
    const statusEl   = document.getElementById('status');
    const signBtn    = document.getElementById('sign-btn');
    const cancelLink = document.getElementById('cancel-link');
    const pinForm    = document.getElementById('pin-form');
    const pinInput   = document.getElementById('pin-input');

    if (_isShare) platEl.textContent = 'shared text — copy the token, then tap Back to return to your app';
    else if (ctx.platform) platEl.textContent = `via ${ctx.platform}`;

    if (_isRawText) {
      previewEl.textContent = ctx.rawText || '(no text provided)';
      cancelLink.style.display = 'none';
    } else {
      previewEl.textContent = _sp.get('preview') || '(no preview provided)';
    }

    // Show PIN form if pin fallback is active
    db.get('settings', 'pin_fallback_enabled').then(s => {
      if (s?.value === true) {
        pinForm.style.display = 'block';
        signBtn.textContent = 'Sign with PIN';
        pinInput.focus();
      }
    }).catch(() => {});

    // Send response back to the extension (extension pre-built path only).
    function sendExtResponse(msg) {
      if (typeof chrome !== 'undefined' && chrome.runtime && ctx.extId) {
        chrome.runtime.sendMessage(ctx.extId, msg);
      }
    }

    // ── Inline CANON-1..9 for the raw-text path ──────────────────────────────
    // (mirrors core/canon.js exactly — kept inline so sign.html has no extra deps)

    function _wrap(text) {
      const W = 80;
      return text.split('\n').map(line => {
        if (line.length <= W) return line;
        const words = line.split(' ');
        const out = [];
        let cur = '';
        for (const word of words) {
          if (cur === '') {
            cur = word;
          } else if ((cur + ' ' + word).length <= W) {
            cur += ' ' + word;
          } else {
            out.push(cur);
            cur = word;
          }
        }
        if (cur !== '') out.push(cur);
        return out.join('\n');
      }).join('\n');
    }

    async function _canonicalise(rawText) {
      let text = String(rawText ?? '');
      const lastTokenIdx = text.lastIndexOf('[SSD:');
      if (lastTokenIdx !== -1) text = text.slice(0, lastTokenIdx);
      text = text.normalize('NFC');
      text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
      text = text.split('\n').map(l => l.replace(/[ \t]+$/, '')).join('\n');
      text = text.replace(/^\n+/, '');
      text = text.replace(/\n+$/, '');
      text = _wrap(text);
      text = text + '\n';
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest('SHA-256', bytes);
      const contentHash = Array.from(new Uint8Array(digest))
        .map(b => b.toString(16).padStart(2, '0')).join('');
      return { canonicalText: text, contentHash };
    }

    // ── Display token (raw-text path result) ─────────────────────────────────

    function _showToken(token) {
      previewEl.textContent = token;
      statusEl.innerHTML = '<span class="ok">✓ Signed — copy the token above and paste it into your post.</span>';
      const copyBtn = document.createElement('button');
      copyBtn.textContent = 'Copy token';
      copyBtn.style.marginTop = '12px';
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(token).then(() => {
          copyBtn.textContent = 'Copied!';
          setTimeout(() => { copyBtn.textContent = 'Copy token'; }, 2000);
        });
      });
      document.querySelector('.actions').replaceChildren(copyBtn);
    }

    // ── doSign: handles both entry shapes ────────────────────────────────────

    async function doSign() {
      signBtn.disabled = true;
      const pin = pinForm.style.display !== 'none' ? pinInput.value : null;
      statusEl.textContent = 'Signing…';
      try {
        const keys = await db.getAll('my_keys');

        if (_isRawText) {
          // Raw-text path: canonicalise first (no auth needed), then unlock once and sign.
          const rec = keys.find(k => k.is_default) || keys[0];
          if (!rec) throw new Error('No signing key found — set one up in the SSD app first.');
          const { contentHash } = await _canonicalise(ctx.rawText);
          const identity  = `fp:${rec.hash8}`;
          const timestamp = new Date().toISOString().slice(0, 16) + 'Z';
          const payload   = `${rec.hash8}:${identity}:${contentHash}:${timestamp}`;
          try {
            await keyring.unlock(pin);
          } catch (e) {
            if (e.pinRequired) {
              pinForm.style.display = 'block';
              signBtn.textContent = 'Sign with PIN';
              signBtn.disabled = false;
              statusEl.innerHTML = '<span class="warn">Enter your signing PIN and try again.</span>';
              pinInput.focus();
              return;
            }
            throw e;
          }
          const privateKey = await keyring.getPrivateKey(rec.id);
          const sig        = await cryptoOps.sign(privateKey, new TextEncoder().encode(payload));
          const content8   = contentHash.slice(0, 8);
          const token      = `[SSD:${rec.hash8}:${identity}:${content8}:${sig}:${timestamp}]`;
          _showToken(token);

        } else {
          // Extension pre-built path: fingerprint param identifies which key to use.
          const rec = keys.find(k => k.hash8 === ctx.fingerprint);
          if (!rec) throw new Error(`Key not found in keyring: ${ctx.fingerprint}`);
          try {
            await keyring.unlock(pin);
          } catch (e) {
            if (e.pinRequired) {
              pinForm.style.display = 'block';
              signBtn.textContent = 'Sign with PIN';
              signBtn.disabled = false;
              statusEl.innerHTML = '<span class="warn">Enter your signing PIN and try again.</span>';
              pinInput.focus();
              return;
            }
            throw e;
          }
          const privateKey = await keyring.getPrivateKey(rec.id);
          const sig = await cryptoOps.sign(privateKey, new TextEncoder().encode(ctx.signedPayload));
          sendExtResponse({ type: 'SSD_SIGN_RESPONSE', requestId: ctx.requestId, signature: sig });
          statusEl.innerHTML = '<span class="ok">✓ Signed — you can close this window.</span>';
          setTimeout(() => window.close(), 1500);
        }
      } catch (e) {
        signBtn.disabled = false;
        statusEl.innerHTML = `<span class="fail">Failed: ${e.message}</span>`;
        log('sign error', e);
      }
    }

    function doCancel() {
      sendExtResponse({ type: 'SSD_SIGN_RESPONSE', requestId: ctx.requestId, error: 'cancelled' });
      window.close();
    }

    signBtn.addEventListener('click', doSign);
    pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSign(); });
    cancelLink.addEventListener('click', e => { e.preventDefault(); doCancel(); });
  </script>
</body>
</html>
