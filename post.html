<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSD — Post</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --text: #e8e8e8; --text-muted: #666;
      --border: #2a2a2a; --primary: #c8a96e; --primary-hover: #b8935a;
      --success: #4caf77; --warning: #e8a020; --danger: #e05050;
      --mono: 'SF Mono', 'Fira Code', monospace; --radius: 6px;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; display: flex; flex-direction: column; min-height: 100dvh; padding: 16px; gap: 12px; }
    .hint { font-size: 12px; color: var(--text-muted); min-height: 16px; }
    textarea { width: 100%; flex: 1; min-height: 200px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 14px; font-size: 15px; font-family: inherit; line-height: 1.6; resize: none; }
    textarea:focus { outline: none; border-color: var(--primary); }
    textarea[readonly] { color: var(--text-muted); }
    .status { font-size: 13px; min-height: 20px; }
    .ok   { color: var(--success); }
    .fail { color: var(--danger); font-weight: 600; }
    .warn { color: var(--warning); }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    button { background: var(--primary); color: #0a0a0a; border: none; padding: 13px 28px; border-radius: var(--radius); cursor: pointer; font-size: 15px; font-weight: 600; transition: background .15s; flex: 1; }
    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    button.secondary:hover { border-color: var(--text-muted); }
    #pin-form { display: none; }
    #pin-form input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: var(--radius); font-size: 15px; }
    .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; }
  </style>
</head>
<body>
  <p class="hint" id="hint"></p>
  <textarea id="post-text" placeholder="Paste or type your post here…" spellcheck="true"></textarea>
  <div id="status" class="status"></div>
  <div id="pin-form">
    <p class="label">Signing PIN</p>
    <input type="password" id="pin-input" placeholder="0000" maxlength="4" inputmode="numeric" autocomplete="current-password">
  </div>
  <div class="actions" id="actions">
    <button id="action-btn">Sign</button>
  </div>

  <script>const MOCK_MODE = false; const MOCK_DB = null; const log = (...a) => console.log('[SSD post]', ...a);</script>
  <script src="db.js"></script>
  <script src="cryptoOps.js"></script>
  <script src="passkey.js"></script>
  <script src="keyring.js"></script>
  <script>
  'use strict';

  const TOKEN_RE = /\[SSD:([^:\]]+):([^:\]]+):([^:\]]+):([^:\]]+):([^\]]+)\]/;

  const sp       = new URLSearchParams(location.search);
  const initText = sp.get('text') || sp.get('title') || '';
  const ta       = document.getElementById('post-text');
  const statusEl = document.getElementById('status');
  const hintEl   = document.getElementById('hint');
  const actionBtn= document.getElementById('action-btn');
  const actionsEl= document.getElementById('actions');
  const pinForm  = document.getElementById('pin-form');
  const pinInput = document.getElementById('pin-input');

  if (initText) ta.value = initText;

  // ── CANON (mirrors core/canon.js) ─────────────────────────────────────────
  function _wrap(text) {
    const W = 80;
    return text.split('\n').map(line => {
      if (line.length <= W) return line;
      const words = line.split(' '), out = [];
      let cur = '';
      for (const w of words) {
        if (!cur) { cur = w; }
        else if ((cur + ' ' + w).length <= W) { cur += ' ' + w; }
        else { out.push(cur); cur = w; }
      }
      if (cur) out.push(cur);
      return out.join('\n');
    }).join('\n');
  }

  async function canonicalise(rawText) {
    let t = String(rawText ?? '');
    const idx = t.lastIndexOf('[SSD:');
    if (idx !== -1) t = t.slice(0, idx);
    t = t.normalize('NFC')
         .replace(/\r\n/g, '\n').replace(/\r/g, '\n')
         .split('\n').map(l => l.replace(/[ \t]+$/, '')).join('\n')
         .replace(/^\n+/, '').replace(/\n+$/, '');
    t = _wrap(t) + '\n';
    const bytes = new TextEncoder().encode(t);
    const digest = await crypto.subtle.digest('SHA-256', bytes);
    const contentHash = Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2,'0')).join('');
    return { canonicalText: t, contentHash };
  }

  // ── Mode detection ─────────────────────────────────────────────────────────
  function detectMode(text) {
    return TOKEN_RE.test(text) ? 'verify' : 'sign';
  }

  function updateMode() {
    const mode = detectMode(ta.value);
    actionBtn.textContent = mode === 'verify' ? 'Verify' : 'Sign';
    hintEl.textContent = mode === 'verify'
      ? 'Token detected — tap Verify to check the signature.'
      : 'shared text — sign, copy the token, then tap Back to return to your app';
    actionBtn.onclick = mode === 'verify' ? doVerify : doSign;
  }

  ta.addEventListener('input', updateMode);
  updateMode();

  // ── Sign ──────────────────────────────────────────────────────────────────
  async function doSign() {
    actionBtn.disabled = true;
    const pin = pinForm.style.display !== 'none' ? pinInput.value : null;
    statusEl.textContent = 'Signing…';
    try {
      const rawText = ta.value.trim();
      if (!rawText) { statusEl.innerHTML = '<span class="fail">No text to sign.</span>'; actionBtn.disabled = false; return; }
      const keys = await db.getAll('my_keys');
      const rec = keys.find(k => k.is_default) || keys[0];
      if (!rec) throw new Error('No signing key — set one up in the SSD app first.');
      const { contentHash } = await canonicalise(rawText);
      const identity  = `fp:${rec.hash8}`;
      const timestamp = new Date().toISOString().slice(0, 16) + 'Z';
      const payload   = `${rec.hash8}:${identity}:${contentHash}:${timestamp}`;
      try { await keyring.unlock(pin); } catch (e) {
        if (e.pinRequired) {
          pinForm.style.display = 'block'; actionBtn.textContent = 'Sign with PIN';
          actionBtn.disabled = false; statusEl.innerHTML = '<span class="warn">Enter your signing PIN.</span>';
          pinInput.focus(); return;
        }
        throw e;
      }
      const privateKey = await keyring.getPrivateKey(rec.id);
      const sig   = await cryptoOps.sign(privateKey, new TextEncoder().encode(payload));
      const c8    = contentHash.slice(0, 8);
      const token = `[SSD:${rec.hash8}:${identity}:${c8}:${sig}:${timestamp}]`;
      const signed = rawText.replace(/\s*\[SSD:[^\]]+\]\s*$/, '').trimEnd() + '\n' + token;
      ta.value = signed;
      ta.readOnly = true;
      statusEl.innerHTML = '<span class="ok">✓ Signed — copy the text above and paste it into your post.</span>';
      actionsEl.innerHTML = '';
      const copyBtn = document.createElement('button');
      copyBtn.textContent = 'Copy signed post';
      copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(signed).then(() => {
          copyBtn.textContent = 'Copied!';
          setTimeout(() => { copyBtn.textContent = 'Copy signed post'; }, 2000);
        });
      });
      actionsEl.appendChild(copyBtn);
    } catch (e) {
      actionBtn.disabled = false;
      statusEl.innerHTML = `<span class="fail">Failed: ${e.message}</span>`;
    }
  }

  // ── Verify ────────────────────────────────────────────────────────────────
  async function doVerify() {
    actionBtn.disabled = true;
    statusEl.textContent = 'Verifying…';
    try {
      const fullText = ta.value;
      const m = TOKEN_RE.exec(fullText);
      if (!m) throw new Error('No SSD token found in text.');
      const [, hash8, identity, content8, sig, timestamp] = m;
      const preToken = fullText.slice(0, fullText.indexOf(m[0]));
      const { contentHash } = await canonicalise(preToken);
      if (contentHash.slice(0, 8) !== content8) {
        statusEl.innerHTML = '<span class="fail">✗ Content mismatch — the post text has been altered since signing.</span>';
        actionBtn.disabled = false; return;
      }
      const payload = `${hash8}:${identity}:${contentHash}:${timestamp}`;
      // Find key by hash8 in my_keys then contact_keys
      const allKeys = [...(await db.getAll('my_keys')), ...(await db.getAll('contact_keys'))];
      const keyRec  = allKeys.find(k => k.hash8 === hash8);
      if (!keyRec) {
        statusEl.innerHTML = `<span class="warn">⚠ Signature valid structure but signer key <code>${hash8}</code> not in keyring — import their key card to fully verify.</span>`;
        actionBtn.disabled = false; return;
      }
      const publicKey = await cryptoOps.importPublicKeyB64(keyRec.public_key_b64);
      const ok = await cryptoOps.verify(publicKey, sig, new TextEncoder().encode(payload));
      if (ok) {
        const name = keyRec.name || hash8;
        statusEl.innerHTML = `<span class="ok">✓ Valid — signed by <strong>${name}</strong> at ${timestamp}</span>`;
      } else {
        statusEl.innerHTML = '<span class="fail">✗ Invalid signature — do not trust this post.</span>';
      }
      actionBtn.disabled = false;
    } catch (e) {
      actionBtn.disabled = false;
      statusEl.innerHTML = `<span class="fail">Verification failed: ${e.message}</span>`;
    }
  }

  pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSign(); });
  </script>
</body>
</html>
